version: "3.9"

services:
  db:
    image: postgres:16
    container_name: carms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: carms
      POSTGRES_PASSWORD: carms
      POSTGRES_DB: carms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carms -d carms_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - carms_net

  init-db:
    build: .
    container_name: carms_init_db
    environment:
      DATABASE_URL: postgresql+psycopg2://carms:carms@db:5432/carms_db
      DATA_DIR: /data
      FAISS_PATH: /data/embeddings/faiss_index
    env_file:
      - .env
    command: ["python", "-m", "src.db.init_db"]
    volumes:
      - ../data:/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - carms_net

  etl:
    build: .
    container_name: carms_etl
    environment:
      DATABASE_URL: postgresql+psycopg2://carms:carms@db:5432/carms_db
      DATA_DIR: /data
      FAISS_PATH: /data/embeddings/faiss_index
    env_file:
      - .env
    command:
      [
        "bash",
        "-c",
        "python -m src.etl.extract_zip && \
         python -m src.etl.load_disciplines_from_excel && \
         python -m src.etl.load_programs_from_excel && \
         python -m src.etl.load_program_documents_from_csv"
      ]
    volumes:
      - ../data:/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - carms_net

  embeddings:
    build: .
    container_name: carms_embeddings
    environment:
      DATABASE_URL: postgresql+psycopg2://carms:carms@db:5432/carms_db
      DATA_DIR: /data
      FAISS_PATH: /data/embeddings/faiss_index
    env_file:
      - .env
    command: ["python", "-m", "src.qa.embeddings"]
    volumes:
      - ../data:/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - carms_net

  api:
    build: .
    container_name: carms_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://carms:carms@db:5432/carms_db
      DATA_DIR: /data
      FAISS_PATH: /data/embeddings/faiss_index
    env_file:
      - .env
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ../data:/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - carms_net

  dashboard:
    build: .
    container_name: carms_dashboard
    restart: unless-stopped
    environment:
      API_URL: http://api:8000
      DATA_DIR: /data
      FAISS_PATH: /data/embeddings/faiss_index
    env_file:
      - .env
    command:
      [
        "streamlit",
        "run",
        "dashboard/app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501"
      ]
    ports:
      - "8501:8501"
    volumes:
      - ../data:/data
    depends_on:
      - api
    networks:
      - carms_net
    
  dagster:
    build: .
    command: ["dagster", "dev", "-h", "0.0.0.0", "-p", "3000", "-m", "src.etl.dagster_defs"]
    ports:
      - "3000:3000"
    volumes:
      - ../data:/data
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://carms:carms@db:5432/carms_db
      DATA_DIR: /data
      FAISS_PATH: /data/embeddings/faiss_index
    depends_on:
      db:
        condition: service_healthy
    networks:
      - carms_net

networks:
  carms_net:

volumes:
  postgres_data: